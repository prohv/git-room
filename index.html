<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Room - Learn Git Visually</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>GIT ROOM</h1>
        <p>A simple space to understand Git concepts.</p>
    </header>

    <main class="room">
        <!-- The Bed -->
        <div class="grid-item">
            <div class="item bed">
                <div class="pillow"></div>
                <div class="blanket"></div>
            </div>
            <span class="label">Bed 2</span>
        </div>

        <!-- The Sofa -->
        <div class="grid-item">
            <div class="item sofa">
                <div class="cushion"></div>
            </div>
            <span class="label">Sofa</span>
        </div>

        <!-- The TV area -->
        <div class="grid-item">
            <div class="tv-set">
                <div class="item tv">
                    <div class="screen"></div>
                </div>
                <div class="item tv-stand"></div>
            </div>
            <span class="label">Television set</span>
        </div>

        <!-- The Table and Flowerpot -->
        <div class="grid-item">
            <div class="furniture-group">
                <div class="item table">
                </div>
            </div>
            <span class="label">Table</span>
        </div>

        <!-- A rug -->
        <div class="grid-item">
            <div class="item rug"></div>
            <span class="label">pug</span>
        </div>

        <!-- A window -->
        <div class="grid-item">
            <div class="item window">
                <div class="glass"></div>
            </div>
            <span class="label">Window</span>
        </div>
    </main>

    <footer>
        <p>Edit the code to move items around!</p>
    </footer>

</body>

</html>
